name: Deploy

# Manual, gated deployment to AWS. Requires repo secrets:
#   AWS_DEPLOY_ROLE_ARN  (an IAM role trusted for GitHub OIDC)
#   AWS_REGION
# Lambda function names are assumed to be: job-<function>.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        options: [staging, production]
        default: staging

permissions:
  id-token: write   # required for OIDC
  contents: read

concurrency:
  group: deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Build Lambda packages
        run: make package

      - name: Deploy each Lambda
        run: |
          for fn in ingestor transformer feature_extractor loader insights; do
            echo "Deploying job-$fn ..."
            aws lambda update-function-code \
              --function-name "job-$fn" \
              --zip-file "fileb://build/$fn.zip" \
              --publish
          done
